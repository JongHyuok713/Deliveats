<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <title>가게 등록</title>
    <link rel="stylesheet" th:href="@{/css/store/store-form.css}">
    <script type="module" th:src="@{/js/store/store-form.js}"></script>
</head>
<body>
<section class="store-form-section" layout:fragment="content">
    <h2>가게 등록하기</h2>
    <form id="storeRegisterForm" class="store-form" onsubmit="return false;">
        <label for="name">가게 이름</label>
        <input type="text" id="name" name="name" placeholder="예: 맛있는 김밥천국" required>

        <label for="category">카테고리</label>
        <select id="category" name="category" required>
            <option value="">카테고리를 선택하세요</option>
            <option value="한식">한식</option>
            <option value="치킨">치킨</option>
            <option value="피자">피자</option>
            <option value="분식">분식</option>
            <option value="중식">중식</option>
            <option value="일식">일식</option>
            <option value="패스트푸드">패스트푸드</option>
        </select>

        <label for="address">가게 주소</label>
        <input type="text" id="address" name="address"
               placeholder="예: 서울특별시 강남구..." required>

        <label for="minOrderPrice">최소 주문 금액</label>
        <input type="number" id="minOrderPrice" name="minOrderPrice"
               placeholder="예: 15000" min="0" required>

        <button type="button" id="storeSubmitBtn">가게 등록</button>
    </form>

</section>

</body>
</html>
