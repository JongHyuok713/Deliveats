<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <title>내 가게 관리</title>
    <link rel="stylesheet" th:href="@{/css/store/my-store.css}">
</head>
<body>

<section layout:fragment="content" class="my-store-container">

    <!-- 가게 기본 정보 -->
    <div class="store-info-box">
        <h1 class="store-title" id="storeName"></h1>
        <p class="store-category" id="storeCategory"></p>
        <p class="store-address" id="storeAddress"></p>
        <p class="store-min-price">
            최소 주문금액:
            <span id="storeMinOrderPrice"></span>원
        </p>
    </div>

    <hr class="divider">

    <!-- 메뉴 관리 -->
    <div class="section">
        <div class="section-header">
            <h2>메뉴 관리</h2>
            <div id="ownerMenuButtonArea"></div>
        </div>

        <div id="menuList" class="menu-grid">
            <!-- JS자동 렌더링 -->
        </div>
    </div>

    <hr class="divider">

    <!--  리뷰관리 -->
    <div class="section">
        <div class="section-header">
            <h2>리뷰 관리</h2>
            <p class="section-sub">고객이 남긴 리뷰를 관리할 수 있습니다.</p>
        </div>

        <div id="reviewList" class="review-list">
            <!-- JS자동 렌더링 -->
        </div>
    </div>
</section>

<th:block layout:fragment="scripts">
    <script type="module" th:src="@{/js/store/my-store.js}"></script>
</th:block>
</body>
</html>
