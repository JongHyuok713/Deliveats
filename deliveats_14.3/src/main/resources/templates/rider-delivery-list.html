<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<section class="rider-delivery" layout:fragment="content">
    <h1>내 배달 목록</h1>

    <div th:if="${#lists.isEmpty(deliveries)}">
        <p>현재 배달할 주문이 없습니다.</p>
    </div>

    <div th:if="${!#lists.isEmpty(deliveries)}" class="delivery-container">
        <div th:each="delivery : ${deliveries}" class="delivery-card">
            <h3>
                주문 번호: <span th:text="${delivery.order.id}"></span>
            </h3>
            <p>가게명: <span th:text="${delivery.order.store.name}"></span></p>
            <p>주문자: <span th:text="${delivery.order.store.username}"></span></p>
            <p>주소: <span th:text="${delivery.order.store.address}"></span></p>
            <p>현재 상태:
                <strong th:text="${delivery.status}"></strong>
            </p>

            <!-- 상태 변경 Form -->
            <form th:action="@{'/rider/deliveries/' + ${delivery.id} + '/update'}" method="post" class="status-form">
                <label>상태 변경:
                    <select name="status" required>
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s == delivery.status}"></option>
                    </select>
                </label>
                <button type="submit">변경</button>
            </form>
        </div>
    </div>

    <div th:if="${error}">
        <p style="color:red;" th:text="${error}"></p>
    </div>
</section>

</body>
</html>
