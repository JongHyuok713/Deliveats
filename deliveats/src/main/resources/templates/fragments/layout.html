<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - DelivEats">DelivEats</title>
    <link rel="stylesheet" th:href="@{/css/fragments/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}">
    <th:block layout:fragment="head"></th:block>
</head>
<body>
<header class="navbar-wrapper">
    <nav class="navbar">
        <!-- 로고 -->
        <div class="nav-left">
            <a th:href="@{/}" class="logo">DelivEats</a>
        </div>

        <!-- 가운데 메뉴 (PC 전용) -->
        <ul class="nav-center">
            <li><a th:href="@{/stores}">가게 찾기</a></li>
        </ul>

        <!-- 오른쪽 메뉴 -->
        <div class="nav-right">

            <!-- 장바구니 -->
                <a th:href="@{/cart}" id="navCartIcon" class="cart-icon hidden">
                    🛒 <span id="cartCount" class="cart-badge hidden">0</span>
                </a>

            <!-- 공통 메뉴 -->
            <a th:href="@{/}" class="nav-link">홈</a>
            <a th:href="@{/stores}" class="nav-link">음식 찾기</a>

            <!-- 비로그인 전용 -->
            <a th:href="@{/login}" id="loginLink" class="nav-link">로그인</a>
            <a th:href="@{/register}" id="registerLink" class="nav-link highlight">회원가입</a>

            <!-- USER 전용 -->
            <a th:href="@{/orders/my}" id="menuUser" class="nav-link hidden">내 주문</a>

            <!-- OWNER 전용-->
            <a th:href="@{/stores/my}" id="menuOwner" class="nav-link hidden">내 가게 관리</a>

            <!-- RIDER 전용 -->
            <a th:href="@{/rider/deliveries}" id="menuRider" class="nav-link hidden">배달 리스트</a>

            <!-- ADMIN 전용 -->
            <a th:href="@{/admin}" id="menuAdmin" class="nav-link hidden">관리자 대시보드</a>

            <!-- 프로필 메뉴 -->
            <div id="profileMenuWrapper" class="profile-wrapper hidden">
                <div id="profileIcon" class="profile-icon">
                    <span id="profileInitial">U</span>
                </div>

                <div id="profileDropdown" class="profile-dropdown hidden">
                    <div class="profile-header">
                        <span id="profileUsername">username</span>
                        <span id="profileRole">USER</span>
                    </div>

                    <ul class="profile-menu">
                        <li><a th:href="@{/profile}">내 프로필</a></li>
                        <li><a th:href="@{/account}">계정 설정</a></li>
                        <li class="divider"></li>
                        <li><button id="profileLogoutBtn">로그아웃</button></li>
                    </ul>
                </div>
            </div>

            <!-- 햄버거 (모바일) -->
            <button id="hamburgerBtn" class="hamburger">
                ☰
            </button>
        </div>
    </nav>

    <!-- 모바일 오버레이 -->
    <div id="mobileOverlay" class="mobile-overlay hidden"></div>

    <!-- 모바일 메뉴 -->
    <div id="mobileMenu" class="mobile-menu hidden"></div>
</header>

<!-- 페이지 본문 -->
<main layout:fragment="content"></main>

<!-- 개별 페이지 JS 삽입용 -->
<th:block layout:fragment="scripts"></th:block>

<footer>
    <p>&copy; 2025 DelivEats - 모든 권리 보유</p>
</footer>

<script type="module" th:src="@{/js/common/navbar.js}"></script>

</body>
</html>
