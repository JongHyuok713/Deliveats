<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <link rel="stylesheet" th:href="@{/css/user/myPage.css}">
    <script type="module" th:src="@{/js/user/myPage.js}"></script>
</head>

<body>

<section layout:fragment="content" class="mp-container">

    <h1 class="mp-title">마이페이지</h1>
    <div class="profile-card">

        <h2>내 정보</h2>

        <p><strong>아이디:</strong> <span id="mp-username"></span></p>
        <p><strong>역할:</strong> <span id="mp-role"></span></p>
        <p><strong>주소:</strong> <span id="mp-address"></span></p>
        <p><strong>전화번호:</strong> <span id="mp-phone"></span></p>

        <button id="editAddressBtn" class="line-btn">주소 변경</button>
        <div id="editAddressForm" class="edit-form hidden">
            <input type="text" id="newAddress" placeholder="새 주소 입력">
            <button id="saveAddressBtn" class="primary-btn">저장</button>
        </div>

        <button id="editPhoneBtn" class="line-btn">전화번호 변경</button>
        <div id="editPhoneForm" class="edit-form hidden">
            <input type="text" id="newPhone" placeholder="새 전화번호 입력">
            <button id="savePhoneBtn" class="primary-btn">저장</button>
        </div>
    </div>

    <div class="mp-menu">
        <a th:href="@{/orders/my}" class="mp-item">내 주문 내역</a>
        <a th:href="@{/reviews/my}" class="mp-item">내 리뷰</a>
        <a th:href="@{/mypage/password}" class="mp-item">비밀번호 변경</a>
        <button id="logoutBtn" class="mp-item logout">로그아웃</button>
    </div>
</section>

</body>
</html>
